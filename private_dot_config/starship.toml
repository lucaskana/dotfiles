format = """
$shell\
$directory\
$git_branch\
$git_status\
$fill\
$python\
$lua\
$nodejs\
$golang\
$haskell\
$rust\
$ruby\
$package\
$aws\
$docker_context\
$jobs\
$cmd_duration\
$time\
$line_break\
$character
"""

add_newline = true
palette = 'nord'

[time]
disabled = false
# Use a specific time format (e.g., 24-hour clock)
time_format = "%F %T" # Example: YYYY-MM-DD HH:MM:SS
# Apply a style (optional)
style = "bold purple" 

[directory]
style = 'bold fg:dark_blue'
format = '[$path ]($style)'
truncation_length = 3
truncation_symbol = 'вҖҰ/'
truncate_to_repo = false

[directory.substitutions]
'Documents' = 'у°Ҳҷ'
'Downloads' = 'пҖҷ '
'Music' = 'пҖҒ '
'Pictures' = 'пҖҫ '

[git_branch]
style = 'fg:green'
symbol = 'пҗҳ '
format = '[on](white) [$symbol$branch ]($style)'

[git_status]
style = 'fg:green'
format = '([$all_status$ahead_behind]($style) )'

[fill]
symbol = ' '

[character]
success_symbol = '[вһң](bold green) '
error_symbol = '[вң—](bold red) '

[python]
style = 'teal'
symbol = 'оҲө '
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
pyenv_version_name = true
pyenv_prefix = ''

[lua]
symbol = 'оҳ  '

[nodejs]
style = 'blue'
symbol = 'оңҳ '

[golang]
style = 'blue'
symbol = 'оҳ§ '

[haskell]
style = 'blue'
symbol = 'оқ· '

[rust]
style = 'orange'
symbol = 'оһЁ '

[ruby]
style = 'blue'
symbol = 'оһ‘ '

[package]
symbol = 'у°Ҹ— '

[aws]
symbol = 'пү° '
style = 'yellow'
format = '[$symbol($profile )(\[$duration\] )]($style)'

[docker_context]
symbol = 'пҢҲ '
style = 'fg:#06969A'
format = '[$symbol]($style) $path'
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
detect_extensions = ['Dockerfile']

[jobs]
symbol = 'пҖ“ '
style = 'red'
number_threshold = 1
format = '[$symbol]($style)'

[cmd_duration]
min_time = 400
format = "вҸұпёҸ  [$duration]($style)"
style = "yellow bold"

[shell]
disabled = false
style = "bold purple"
format = """[$indicator]($style) """
# Defina o texto/Гӯcone para cada shell que vocГӘ usa:
bash_indicator = "bash п’ү"
zsh_indicator = "п’ү zsh"
fish_indicator = "у°Ҳә fish"
powershell_indicator = "pwsh п‘ "
nu_indicator = "п’ө nu"
unknown_indicator = "sh ?"


[palettes.nord]
dark_blue = '#5E81AC'
blue = '#81A1C1'
teal = '#88C0D0'
red = '#BF616A'
orange = '#D08770'
green = '#A3BE8C'
yellow = '#EBCB8B'
purple = '#B48EAD'
gray = '#434C5E'
black = '#2E3440'
white='#D8DEE9'

[palettes.onedark]
dark_blue='#61afef'
blue='#56b6c2'
red='#e06c75'
green='#98c379'
purple='#c678dd'
cyan='#56b6c2'
orange='#be5046'
yellow='#e5c07b'
gray='#828997'
white ='#abb2bf'
black='#2c323c'
